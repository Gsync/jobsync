description: Job match prompt regression tests

providers:
  - id: openai:chat:deepseek-v4-flash
    config:
      apiBaseUrl: https://api.deepseek.com
      apiKeyEnvar: DEEPSEEK_API_KEY
      showThinking: false
      temperature: 0
      max_tokens: 8192

prompts:
  - file://./prompt.ts

tests:
  - description: Backend resume vs matching backend JD - strong fit
    vars:
      resumeText: file://./fixtures/backend-resume.txt
      jobDescription: file://./fixtures/backend-job.txt
    assert:
      - type: javascript
        value: file://./assertions.ts:assertNotJson
      - type: javascript
        value: file://./assertions.ts:assertScoresLine
      - type: javascript
        value: file://./assertions.ts:assertScoresFirstLine
      - type: javascript
        value: file://./assertions.ts:assertMarkdownBodyNonEmpty
      - type: javascript
        value: file://./assertions.ts:assertRequiredSections
      - type: javascript
        value: file://./assertions.ts:assertRecommendationConsistent
      - type: javascript
        value: file://./assertions.ts:assertStrongMatchHigh

  - description: Marketing resume vs backend JD - weak fit
    vars:
      resumeText: file://./fixtures/marketing-resume.txt
      jobDescription: file://./fixtures/backend-job.txt
    assert:
      - type: javascript
        value: file://./assertions.ts:assertNotJson
      - type: javascript
        value: file://./assertions.ts:assertScoresLine
      - type: javascript
        value: file://./assertions.ts:assertScoresFirstLine
      - type: javascript
        value: file://./assertions.ts:assertMarkdownBodyNonEmpty
      - type: javascript
        value: file://./assertions.ts:assertRequiredSections
      - type: javascript
        value: file://./assertions.ts:assertRecommendationConsistent
      - type: javascript
        value: file://./assertions.ts:assertWeakMatchLow
      # Analysis must call out the missing backend must-haves by name.
      - type: icontains-any
        value:
          - "Go"
          - "Kubernetes"
          - "AWS"
