description: Resume review prompt regression tests

providers:
  - id: openai:chat:deepseek-chat
    config:
      apiBaseUrl: https://api.deepseek.com
      apiKeyEnvar: DEEPSEEK_API_KEY
      temperature: 0
      max_tokens: 8192
      response_format:
        type: json_object

prompts:
  - file://./prompt.ts

tests:
  - description: Strong senior engineer resume - structural validation
    vars:
      resumeText: file://./fixtures/strong-senior.txt
    assert:
      - type: javascript
        value: file://./assertions.ts:assertValidJson
      - type: javascript
        value: file://./assertions.ts:assertRequiredFields
      - type: javascript
        value: file://./assertions.ts:assertScoresInRange
      - type: javascript
        value: file://./assertions.ts:assertTopImprovementsCount
      - type: javascript
        value: file://./assertions.ts:assertSummaryNonEmpty
      - type: javascript
        value: file://./assertions.ts:assertSectionFeedbackStructure

  - description: Weak/sparse resume - structural validation
    vars:
      resumeText: file://./fixtures/weak-sparse.txt
    assert:
      - type: javascript
        value: file://./assertions.ts:assertValidJson
      - type: javascript
        value: file://./assertions.ts:assertRequiredFields
      - type: javascript
        value: file://./assertions.ts:assertScoresInRange
      - type: javascript
        value: file://./assertions.ts:assertTopImprovementsCount
      - type: javascript
        value: file://./assertions.ts:assertSummaryNonEmpty
      - type: javascript
        value: file://./assertions.ts:assertSectionFeedbackStructure
